version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./briefly.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-briefly-docker-secret}
      - MODEL_PATH=./model
      - CORS_ORIGINS=["http://localhost:3000"]
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
